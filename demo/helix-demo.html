<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HELIX — Interactive Demo</title>
<style>
:root {
  --bg: #0a0d16;
  --bg2: #0e1220;
  --surface: #141928;
  --surface2: #1a2033;
  --border: #232b42;
  --text: #e9edf7;
  --muted: #8b96b3;
  --dim: #5c6785;
  --accent: #6366f1;
  --accent2: #22d3ee;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --radius: 14px;
  --sidebar-w: 240px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font: 14px/1.55 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
}
a { color: var(--accent2); text-decoration: none; }
button { font: inherit; cursor: pointer; }
input, textarea, select {
  font: inherit; color: var(--text);
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 12px; width: 100%;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
textarea { resize: vertical; min-height: 80px; }
label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 5px; font-weight: 600; letter-spacing: .02em; }

/* ---------- layout ---------- */
#app { display: flex; flex: 1; min-height: 0; }
.mobile-top { display: none; }
#backdrop { display: none; }
.sidebar {
  width: var(--sidebar-w); flex: none;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 18px 14px; font-weight: 800; font-size: 17px; letter-spacing: .04em;
}
.logo .mark {
  width: 30px; height: 30px; border-radius: 9px; flex: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: grid; place-items: center; font-size: 15px; color: #fff;
}
.logo small { display: block; font-size: 10px; font-weight: 500; color: var(--dim); letter-spacing: .08em; }
.nav { padding: 6px 10px 20px; }
.nav-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--dim); padding: 14px 10px 6px; text-transform: uppercase; }
.nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 9px; color: var(--muted);
  margin-bottom: 1px; font-weight: 500;
}
.nav a:hover { background: var(--surface); color: var(--text); }
.nav a.active { background: var(--surface2); color: var(--text); }
.nav a .badge { margin-left: auto; }
.main { flex: 1; overflow-y: auto; }
.page { max-width: 1060px; margin: 0 auto; padding: 28px 32px 80px; }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
.page-head h1 { font-size: 24px; letter-spacing: -.02em; }
.page-head p { color: var(--muted); margin-top: 3px; max-width: 560px; }

/* ---------- components ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, var(--accent), #818cf8);
  color: #fff; border: none; border-radius: 10px;
  padding: 9px 16px; font-weight: 600;
  transition: filter .15s, transform .1s;
}
.btn:hover { filter: brightness(1.12); }
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .5; cursor: default; }
.btn.ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.btn.ghost:hover { background: var(--surface2); }
.btn.danger { background: transparent; border: 1px solid var(--border); color: var(--red); }
.btn.sm { padding: 5px 11px; font-size: 12.5px; border-radius: 8px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
}
.grid { display: grid; gap: 14px; }
.grid.c2 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
.grid.c3 { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
.grid.c4 { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
.badge {
  display: inline-flex; align-items: center;
  font-size: 10.5px; font-weight: 700; letter-spacing: .04em;
  padding: 2px 8px; border-radius: 99px;
  background: var(--surface2); color: var(--muted);
}
.badge.on { background: rgba(34,197,94,.15); color: var(--green); }
.badge.warn { background: rgba(234,179,8,.15); color: var(--yellow); }
.badge.acc { background: rgba(99,102,241,.18); color: #a5b4fc; }
.muted { color: var(--muted); }
.dim { color: var(--dim); font-size: 12px; }
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.spread { justify-content: space-between; }
.avatar {
  width: 40px; height: 40px; border-radius: 12px; flex: none;
  display: grid; place-items: center; font-size: 20px;
}
.avatar.sm { width: 28px; height: 28px; border-radius: 8px; font-size: 14px; }
.empty {
  text-align: center; color: var(--dim); padding: 48px 20px;
  border: 1px dashed var(--border); border-radius: var(--radius);
}
.empty .big { font-size: 34px; margin-bottom: 10px; }

/* stat tiles */
.stat { padding: 16px 18px; }
.stat .num { font-size: 26px; font-weight: 800; letter-spacing: -.02em; }
.stat .lbl { color: var(--muted); font-size: 12px; margin-top: 2px; }

/* ---------- chat ---------- */
.chat-layout { display: grid; grid-template-columns: 240px 1fr; gap: 16px; height: calc(100vh - 150px); min-height: 420px; }
.chat-list { overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.chat-list .item {
  padding: 10px 12px; border-radius: 10px; background: var(--surface);
  border: 1px solid var(--border); cursor: pointer; font-size: 13px;
}
.chat-list .item:hover { background: var(--surface2); }
.chat-list .item.active { border-color: var(--accent); }
.chat-panel { display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.msg { max-width: 82%; padding: 12px 15px; border-radius: 14px; }
.msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--surface2); border-bottom-left-radius: 4px; }
.msg .meta { font-size: 10.5px; opacity: .65; margin-bottom: 5px; }
.chat-input { display: flex; gap: 10px; padding: 14px; border-top: 1px solid var(--border); }
.chat-input textarea { min-height: 44px; max-height: 140px; }
.typing { display: inline-flex; gap: 4px; padding: 6px 0; }
.typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
.typing i:nth-child(2) { animation-delay: .2s; }
.typing i:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100% { opacity: .25 } 40% { opacity: 1 } }

/* markdown */
.md h1, .md h2, .md h3 { margin: 14px 0 7px; line-height: 1.25; }
.md h1 { font-size: 18px; } .md h2 { font-size: 15.5px; } .md h3 { font-size: 14px; }
.md p { margin: 7px 0; }
.md ul, .md ol { margin: 7px 0 7px 20px; }
.md li { margin: 3px 0; }
.md code { background: rgba(0,0,0,.3); padding: 1px 5px; border-radius: 5px; font-size: 12.5px; }
.md pre { background: rgba(0,0,0,.3); padding: 12px; border-radius: 9px; overflow-x: auto; margin: 8px 0; }
.md table { border-collapse: collapse; margin: 10px 0; width: 100%; font-size: 13px; }
.md th, .md td { border: 1px solid var(--border); padding: 6px 9px; text-align: left; }
.md th { background: rgba(0,0,0,.2); }
.md blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 8px 0; }
.md hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* ---------- kanban ---------- */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: start; }
.kanban .col { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; min-height: 140px; }
.kanban .col h3 { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; justify-content: space-between; }
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; margin-bottom: 9px; }
.task-card .t { font-weight: 600; margin-bottom: 6px; }

/* ---------- modal ---------- */
.modal-back {
  position: fixed; inset: 0; background: rgba(4,6,12,.7);
  display: grid; place-items: center; z-index: 50; padding: 20px;
  -webkit-backdrop-filter: blur(3px);
  backdrop-filter: blur(3px);
}
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 22px; width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto;
}
.modal h2 { font-size: 17px; margin-bottom: 4px; }
.modal .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
.modal.wide { max-width: 780px; }

/* ---------- misc ---------- */
#toasts {
  position: fixed; bottom: 22px; right: 22px; z-index: 99;
  display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
}
.toast {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 18px; font-weight: 600;
  animation: pop .2s ease-out; box-shadow: 0 8px 30px rgba(0,0,0,.4);
}
.toast.err { border-color: var(--red); }
@keyframes pop { from { transform: translateY(8px); opacity: 0 } }
.score-ring { font-size: 34px; font-weight: 800; }
.check { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.check:last-child { border-bottom: none; }
.check .ic { flex: none; }
.bars { display: flex; align-items: flex-end; gap: 5px; height: 120px; margin-top: 12px; }
.bars .bar { flex: 1; background: linear-gradient(180deg, var(--accent), var(--accent2)); border-radius: 4px 4px 0 0; min-height: 2px; position: relative; }
.bars .bar span { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--muted); }
.bars-x { display: flex; gap: 5px; margin-top: 6px; }
.bars-x div { flex: 1; text-align: center; font-size: 9.5px; color: var(--dim); }
.tabs { display: flex; gap: 6px; margin-bottom: 18px; }
.tabs button {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  border-radius: 9px; padding: 7px 14px; font-weight: 600;
}
.tabs button.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }
.doc-view { white-space: normal; }
.list-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
}
.list-row:hover { background: var(--surface2); }
.list-row:last-child { border-bottom: none; }
.card.pad0 { padding: 0; overflow: hidden; }

@media (max-width: 860px) {
  .mobile-top {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--bg2);
    border-bottom: 1px solid var(--border); flex: none;
  }
  .mobile-top button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 9px; padding: 6px 13px; font-size: 17px; line-height: 1;
  }
  .mobile-top .brand { font-weight: 800; letter-spacing: .04em; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 120;
    width: min(78vw, 280px);
    transform: translateX(-105%); transition: transform .22s ease;
    box-shadow: 12px 0 40px rgba(0,0,0,.5);
  }
  .sidebar.open { transform: translateX(0); }
  #backdrop {
    position: fixed; inset: 0; z-index: 110;
    background: rgba(4,6,12,.6);
  }
  #backdrop.show { display: block; }
  .page { padding: 20px 16px 70px; }
  .page-head h1 { font-size: 20px; }
  .grid { grid-template-columns: 1fr !important; }
  .grid.c4 { grid-template-columns: 1fr 1fr !important; }
  .chat-layout { grid-template-columns: 1fr; height: auto; }
  .chat-list { flex-direction: row; overflow-x: auto; max-height: 76px; }
  .chat-list .item { min-width: 170px; flex: none; }
  .chat-panel { height: 62vh; min-height: 380px; }
  .kanban { grid-template-columns: 1fr; }
}


#demo-banner{flex:none;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;

#demo-banner b{color:var(--text)}
#demo-banner .demo-note{color:var(--dim)}
@media (max-width:860px){#demo-banner .demo-note{display:none}}

const HX = (() => {

// The 12 AI employees: personas, colors, and system prompts.

const HELPER_MAP = Object.fromEntries(HELPERS.map((h) => [h.id, h]));

function brainContext(brain, knowledge) {
  const lines = [];
  if (brain.businessName) lines.push(`Business: ${brain.businessName}`);
  if (brain.tagline) lines.push(`Tagline: ${brain.tagline}`);
  if (brain.industry) lines.push(`Industry: ${brain.industry}`);
  if (brain.description) lines.push(`About: ${brain.description}`);
  if (brain.audience) lines.push(`Target audience: ${brain.audience}`);
  if (brain.tone) lines.push(`Brand tone: ${brain.tone}`);
  if (brain.products) lines.push(`Products/services: ${brain.products}`);
  if (brain.goals) lines.push(`Current goals: ${brain.goals}`);
  if (brain.website) lines.push(`Website: ${brain.website}`);
  if (brain.location) lines.push(`Location: ${brain.location}`);
  for (const k of knowledge.slice(0, 20)) {
    lines.push(`Knowledge — ${k.title}: ${String(k.content).slice(0, 1500)}`);
  }
  return lines.join('\n');
}

function systemPrompt(helper, brain, knowledge) {
  const ctx = brainContext(brain, knowledge);
  return [
    helper.prompt,
    ctx ? `\nBusiness context (Brain):\n${ctx}` : '',
    '\nAlways tailor output to this business. Use markdown. Be direct and actionable.',
  ].join('\n');
}


// Offline generation engine: deterministic, brand-aware, persona-flavored
// structured output. Used when no LLM provider is configured, and as the
// fallback when a provider call fails — so every feature works with zero
// network access and zero API keys.

function biz(brain) {
  return brain.businessName || 'your business';
}
function aud(brain) {
  return brain.audience || 'your target customers';
}
function prod(brain) {
  return brain.products || 'your products and services';
}

function detectIntent(text) {
  const t = text.toLowerCase();
  const has = (...ws) => ws.some((w) => t.includes(w));
  if (has('subject line', 'email', 'newsletter', 'drip', 'sequence')) return 'email';
  if (has('social', 'post', 'instagram', 'linkedin', 'tiktok', 'tweet', 'caption', 'hashtag')) return 'social';
  if (has('seo', 'keyword', 'rank', 'meta description', 'search')) return 'seo';
  if (has('landing', 'headline', 'copy', 'tagline', 'slogan', 'ad ')) return 'copy';
  if (has('sales', 'cold', 'outreach', 'pitch', 'objection', 'close', 'proposal')) return 'sales';
  if (has('support', 'refund', 'complaint', 'apolog', 'faq', 'help article')) return 'support';
  if (has('job', 'hire', 'hiring', 'candidate', 'interview', 'recruit')) return 'recruiting';
  if (has('kpi', 'metric', 'report', 'analyz', 'analys', 'data', 'forecast', 'a/b')) return 'data';
  if (has('plan', 'strategy', 'roadmap', 'goal', 'grow')) return 'plan';
  if (has('sop', 'checklist', 'agenda', 'summar', 'organize', 'schedule')) return 'ops';
  if (has('product description', 'listing', 'cart', 'pricing', 'store')) return 'ecommerce';
  return 'general';
}

    return `# Email campaign draft

  try { return JSON.parse(m[0]); } catch { return null; }
}

}

function applyGeneratedContent(site, content) {
  for (const sec of site.sections || []) {
    const c = content[sec.type];
    if (!c) continue;
    if (sec.type === 'hero' || sec.type === 'cta') {
      if (c.headline) sec.headline = String(c.headline);
      if (c.sub) sec.sub = String(c.sub);
      if (c.cta) sec.cta = String(c.cta);
    } else if (sec.type === 'features') {
      if (c.title) sec.title = String(c.title);
      if (Array.isArray(c.items) && c.items.length) {
        sec.items = c.items.slice(0, 6).map((i) => ({
          icon: String(i.icon || '✨'), title: String(i.title || ''), text: String(i.text || ''),
        }));
      }
    } else if (sec.type === 'about') {
      if (c.title) sec.title = String(c.title);
      if (c.text) sec.text = String(c.text);
    }
  }
}


// On-page SEO audit engine. Audits raw HTML (from a local Studio site or a
// fetched URL) with weighted checks and returns a scored report.

function extract(re, html, group = 1) {
  const m = html.match(re);
  return m ? m[group].trim() : null;
}
function countMatches(re, html) {
  return (html.match(re) || []).length;
}
function textContent(html) {
  return html
    .replace(/<script[\s\S]*?<\/script>/gi, ' ')
    .replace(/<style[\s\S]*?<\/style>/gi, ' ')
    .replace(/<[^>]+>/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function auditHTML(html, target) {
  const checks = [];
  const add = (id, label, pass, detail, weight = 1, advice = '') =>
    checks.push({ id, label, pass, detail, weight, advice: pass ? '' : advice });

  const title = extract(/<title[^>]*>([\s\S]*?)<\/title>/i, html);
  add('title', 'Title tag present', !!title, title ? `"${title}"` : 'No <title> found', 3,
    'Add a unique, descriptive <title> with your primary keyword near the front.');
  if (title) {
    add('title-length', 'Title length 15–60 chars', title.length >= 15 && title.length <= 60,
      `${title.length} characters`, 2, 'Keep titles between 15 and 60 characters so they display fully in results.');
  }

  const metaDesc = extract(/<meta[^>]+name=["']description["'][^>]+content=["']([^"']*)["']/i, html)
    || extract(/<meta[^>]+content=["']([^"']*)["'][^>]+name=["']description["']/i, html);
  add('meta-desc', 'Meta description present', !!metaDesc, metaDesc ? `${metaDesc.length} chars` : 'Missing', 3,
    'Add a meta description (140–160 chars) that sells the click.');
  if (metaDesc) {
    add('meta-desc-length', 'Meta description 50–160 chars', metaDesc.length >= 50 && metaDesc.length <= 160,
      `${metaDesc.length} characters`, 1, 'Aim for 140–160 characters — long enough to persuade, short enough to avoid truncation.');
  }

  const h1s = countMatches(/<h1[\s>]/gi, html);
  add('h1', 'Exactly one H1', h1s === 1, `${h1s} H1 tag(s) found`, 3,
    h1s === 0 ? 'Add one H1 containing your primary keyword.' : 'Use a single H1; demote the rest to H2/H3.');

  const h2s = countMatches(/<h2[\s>]/gi, html);
  add('h2', 'Uses H2 subheadings', h2s >= 1, `${h2s} H2 tag(s)`, 1,
    'Break content into scannable sections with H2 subheadings.');

  const imgs = html.match(/<img[^>]*>/gi) || [];
  const missingAlt = imgs.filter((i) => !/alt=["'][^"']+["']/i.test(i)).length;
  add('img-alt', 'All images have alt text', imgs.length === 0 || missingAlt === 0,
    imgs.length ? `${missingAlt}/${imgs.length} images missing alt` : 'No images', 2,
    'Add descriptive alt text to every image for accessibility and image search.');

  const words = textContent(html).split(' ').filter(Boolean).length;
  add('word-count', 'Substantial content (300+ words)', words >= 300, `${words} words`, 2,
    'Thin pages rarely rank — expand toward 300+ words of genuinely useful content.');

  add('viewport', 'Mobile viewport meta', /<meta[^>]+name=["']viewport["']/i.test(html), '', 2,
    'Add <meta name="viewport" content="width=device-width, initial-scale=1"> for mobile usability.');

  add('lang', 'HTML lang attribute', /<html[^>]+lang=/i.test(html), '', 1,
    'Declare the page language: <html lang="en">.');

  add('charset', 'Charset declared', /<meta[^>]+charset/i.test(html), '', 1,
    'Add <meta charset="utf-8"> in <head>.');

  const links = countMatches(/<a[^>]+href=/gi, html);
  add('links', 'Contains links', links >= 1, `${links} link(s)`, 1,
    'Add internal links to related pages and at least one clear call-to-action link.');

  add('canonical', 'Canonical URL set', /<link[^>]+rel=["']canonical["']/i.test(html), '', 1,
    'Add <link rel="canonical"> to prevent duplicate-content dilution.');

  add('og', 'Open Graph tags', /<meta[^>]+property=["']og:/i.test(html), '', 1,
    'Add og:title, og:description, and og:image so shares look good on social.');

  const totalWeight = checks.reduce((a, c) => a + c.weight, 0);
  const gained = checks.reduce((a, c) => a + (c.pass ? c.weight : 0), 0);
  const score = Math.round((gained / totalWeight) * 100);

  return {
    target,
    score,
    grade: score >= 90 ? 'A' : score >= 75 ? 'B' : score >= 60 ? 'C' : score >= 40 ? 'D' : 'F',
    passed: checks.filter((c) => c.pass).length,
    failed: checks.filter((c) => !c.pass).length,
    checks,
    createdAt: Date.now(),
  };
}

async function fetchAndAudit(url) {
  const res = await fetch(url, {
    redirect: 'follow',
    signal: AbortSignal.timeout(15_000),
    headers: { 'user-agent': 'HELIX-SEO-Audit/1.0' },
  });
  if (!res.ok) throw new Error(`fetch failed: HTTP ${res.status}`);
  // Read at most ~3MB — enough for any real page's <head> and content checks.
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let html = '';
  while (html.length < 3_000_000) {
    const { done, value } = await reader.read();
    if (done) break;
    html += decoder.decode(value, { stream: true });
  }
  reader.cancel().catch(() => {});
  return auditHTML(html, url);
}


// In-browser HELIX backend for the single-file demo.
// This file is concatenated INSIDE an IIFE after the ported server modules
// (helpers.js, offline.js, powerups.js, sites.js, seo.js), so HELPERS,
// HELPER_MAP, POWERUPS, POWERUP_MAP, offlineGenerate, PALETTES, slugify,
// defaultSections, renderSite and auditHTML are all in scope.

const uid = () =>
  Array.from(crypto.getRandomValues(new Uint8Array(8)), (b) => b.toString(16).padStart(2, '0')).join('');

const DEFAULTS = () => ({
  brain: {
    businessName: '', tagline: '', industry: '', description: '', audience: '',
    tone: 'friendly and professional', products: '', goals: '', website: '', location: '',
  },
  knowledge: [], chats: [], tasks: [], documents: [], automations: [],
  sites: [], calendar: [], emails: [], seoAudits: [], analytics: [], inbox: [],
  settings: { provider: 'offline', apiKey: '', model: '', baseUrl: '' },
});

const STORE_KEY = 'helix-demo-db';
let db = DEFAULTS();
try {
  const saved = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
  if (saved && typeof saved === 'object') {
    const base = DEFAULTS();
    for (const [k, def] of Object.entries(base)) {
      const v = saved[k];
      if (Array.isArray(def)) db[k] = Array.isArray(v) ? v : def;
      else if (def && typeof def === 'object') db[k] = { ...def, ...(v && typeof v === 'object' ? v : {}) };
      else db[k] = v ?? def;
    }
  }
} catch { /* fresh start */ }

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(db)); } catch { /* storage full/blocked: demo keeps running in memory */ }
}

function computeNextRun(schedule, from = Date.now()) {
  if (schedule.type === 'interval') {
    return from + Math.max(1, Number(schedule.minutes) || 60) * 60_000;
  }
  const [rawH, rawM] = String(schedule.time || '09:00').split(':').map((n) => parseInt(n, 10) || 0);
  const d = new Date(from);
  d.setHours(Math.min(23, Math.max(0, rawH)), Math.min(59, Math.max(0, rawM)), 0, 0);
  if (d.getTime() <= from) d.setDate(d.getDate() + 1);
  return d.getTime();
}

function ask(helperId, message) {
  const helper = HELPER_MAP[helperId] || HELPER_MAP.vizzy;
  return { text: offlineGenerate({ helper, brain: db.brain, message }), engine: 'offline' };
}

function runAutomationNow(a) {
  const helper = HELPER_MAP[a.helperId] || HELPER_MAP.vizzy;
  const { text, engine } = ask(helper.id, a.prompt);
  const doc = {
    id: uid(), title: `${a.name} — ${new Date().toLocaleDateString()}`, kind: 'automation',
    helperId: helper.id, content: text, engine, source: a.id, createdAt: Date.now(),
  };
  db.documents.unshift(doc);
  if (db.inbox.length >= 200) db.inbox.length = 199;
  db.inbox.unshift({
    id: uid(), title: `${helper.name} finished “${a.name}”`, body: text.slice(0, 200),
    from: helper.id, read: false, documentId: doc.id, createdAt: Date.now(),
  });
  a.lastRun = Date.now();
  a.runs = (a.runs || 0) + 1;
  a.nextRun = computeNextRun(a.schedule);
  save();
  return doc;
}

setInterval(() => {
  const now = Date.now();
  for (const a of db.automations) {
    if (a.enabled && a.nextRun && a.nextRun <= now) {
      try { runAutomationNow(a); } catch { a.nextRun = computeNextRun(a.schedule); }
    }
  }
}, 15_000);

function recordView(slug, path = '/') {
  const day = new Date().toISOString().slice(0, 10);
  let row = db.analytics.find((r) => r.siteSlug === slug && r.path === path && r.day === day);
  if (row) row.count += 1;
  else db.analytics.push({ siteSlug: slug, path, day, count: 1 });
  save();
}

function analyticsSummary() {
  const bySite = {};
  for (const r of db.analytics) {
    bySite[r.siteSlug] ??= { total: 0, days: {} };
    bySite[r.siteSlug].total += r.count;
    bySite[r.siteSlug].days[r.day] = (bySite[r.siteSlug].days[r.day] || 0) + r.count;
  }
  const series = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86_400_000).toISOString().slice(0, 10);
    series.push({ day: d, count: db.analytics.filter((r) => r.day === d).reduce((a, r) => a + r.count, 0) });
  }
  return { bySite, series, total: db.analytics.reduce((a, r) => a + r.count, 0) };
}

function previewHTML(idOrSlug) {
  const site = db.sites.find((s) => s.id === idOrSlug || s.slug === idOrSlug);
  if (!site) return '<h1 style="font-family:sans-serif">Site not found</h1>';
  return renderSite(site, db.brain);
}

// ---- the API router ----
function handle(method, pathname, query, body) {
  const seg = pathname.split('/').filter(Boolean); // e.g. ['api','tasks','abc']
  const ok = (data, status = 200) => ({ status, data });
  const notFound = (msg = 'not found') => ({ status: 404, data: { error: msg } });
  const bad = (msg) => ({ status: 400, data: { error: msg } });
  const p = seg.slice(1); // drop 'api'
  const id = p[1];

  switch (p[0]) {
    case 'bootstrap':
      return ok({
        helpers: HELPERS, powerups: POWERUPS, palettes: Object.keys(PALETTES),
        settings: { ...db.settings, apiKey: undefined, hasKey: !!db.settings.apiKey },
        counts: {
          chats: db.chats.length, tasks: db.tasks.length, documents: db.documents.length,
          automations: db.automations.length, sites: db.sites.length,
          unread: db.inbox.filter((i) => !i.read).length,
        },
      });

    case 'brain': {
      if (p[1] === 'knowledge') {
        if (method === 'POST') {
          if (!body.title || !body.content) return bad('title and content are required');
          const item = { id: uid(), title: String(body.title), content: String(body.content), createdAt: Date.now() };
          db.knowledge.unshift(item); save();
          return ok(item, 201);
        }
        if (method === 'DELETE') {
          const i = db.knowledge.findIndex((k) => k.id === p[2]);
          if (i === -1) return notFound();
          db.knowledge.splice(i, 1); save();
          return ok({ ok: true });
        }
      }
      if (method === 'GET') return ok({ brain: db.brain, knowledge: db.knowledge });
      if (method === 'PUT') {
        for (const k of ['businessName', 'tagline', 'industry', 'description', 'audience', 'tone', 'products', 'goals', 'website', 'location']) {
          if (k in body) db.brain[k] = String(body[k] ?? '');
        }
        save();
        return ok({ brain: db.brain });
      }
      break;
    }

    case 'chats': {
      if (!id && method === 'GET') {
        let chats = db.chats;
        if (query.helper) chats = chats.filter((c) => c.helperId === query.helper);
        return ok(chats.map(({ messages, ...meta }) => ({ ...meta, messageCount: messages.length })));
      }
      if (!id && method === 'POST') {
        if (!HELPER_MAP[body.helperId]) return bad('unknown helper');
        const chat = { id: uid(), helperId: body.helperId, title: 'New conversation', createdAt: Date.now(), messages: [] };
        db.chats.unshift(chat); save();
        return ok(chat, 201);
      }
      const chat = db.chats.find((c) => c.id === id);
      if (!chat) return notFound();
      if (p[2] === 'messages' && method === 'POST') {
        if (!body.content || !String(body.content).trim()) return bad('content is required');
        chat.messages.push({ role: 'user', content: String(body.content), at: Date.now() });
        if (chat.messages.length === 1) chat.title = String(body.content).slice(0, 60);
        const { text, engine } = ask(chat.helperId, String(body.content));
        const reply = { role: 'assistant', content: text, at: Date.now(), engine };
        chat.messages.push(reply); save();
        return ok({ reply, chat: { id: chat.id, title: chat.title } });
      }
      if (method === 'GET') return ok(chat);
      if (method === 'DELETE') {
        db.chats.splice(db.chats.indexOf(chat), 1); save();
        return ok({ ok: true });
      }
      break;
    }

    case 'tasks': {
      if (!id && method === 'GET') return ok(db.tasks);
      if (!id && method === 'POST') {
        if (!body.title) return bad('title is required');
        const task = {
          id: uid(), title: String(body.title), notes: String(body.notes || ''),
          status: ['todo', 'doing', 'done'].includes(body.status) ? body.status : 'todo',
          helperId: HELPER_MAP[body.helperId] ? body.helperId : null,
          priority: ['low', 'medium', 'high'].includes(body.priority) ? body.priority : 'medium',
          createdAt: Date.now(), deliverableId: null,
        };
        db.tasks.unshift(task); save();
        return ok(task, 201);
      }
      const task = db.tasks.find((t) => t.id === id);
      if (!task) return notFound();
      if (p[2] === 'run' && method === 'POST') {
        const helperId = task.helperId || 'vizzy';
        const { text, engine } = ask(helperId, `Complete this task and produce the deliverable:\nTask: ${task.title}${task.notes ? `\nDetails: ${task.notes}` : ''}`);
        const doc = { id: uid(), title: `Task: ${task.title}`, kind: 'task', helperId, content: text, engine, source: task.id, createdAt: Date.now() };
        db.documents.unshift(doc);
        task.status = 'done';
        task.deliverableId = doc.id;
        save();
        return ok({ task, document: doc });
      }
      if (method === 'PATCH') {
        if (body.title !== undefined) task.title = String(body.title);
        if (body.notes !== undefined) task.notes = String(body.notes);
        if (['todo', 'doing', 'done'].includes(body.status)) task.status = body.status;
        if (['low', 'medium', 'high'].includes(body.priority)) task.priority = body.priority;
        if (body.helperId !== undefined) task.helperId = HELPER_MAP[body.helperId] ? body.helperId : null;
        save();
        return ok(task);
      }
      if (method === 'DELETE') {
        db.tasks.splice(db.tasks.indexOf(task), 1); save();
        return ok({ ok: true });
      }
      break;
    }

    case 'powerups': {
      if (!id && method === 'GET') return ok(POWERUPS);
      const pu = POWERUP_MAP[id];
      if (!pu) return notFound('unknown power-up');
      if (p[2] === 'run' && method === 'POST') {
        const inputs = body.inputs || {};
        for (const f of pu.fields) {
          if (f.required && !String(inputs[f.key] || '').trim()) return bad(`"${f.label}" is required`);
        }
        const { text, engine } = ask(pu.helperId, pu.buildPrompt(inputs));
        const doc = { id: uid(), title: pu.name, kind: 'powerup', helperId: pu.helperId, content: text, engine, source: pu.id, createdAt: Date.now() };
        db.documents.unshift(doc); save();
        return ok(doc);
      }
      break;
    }

    case 'documents': {
      if (!id && method === 'GET') {
        return ok(db.documents.map(({ content, ...m }) => ({ ...m, preview: String(content).slice(0, 160) })));
      }
      const doc = db.documents.find((d) => d.id === id);
      if (!doc) return notFound();
      if (method === 'GET') return ok(doc);
      if (method === 'DELETE') {
        db.documents.splice(db.documents.indexOf(doc), 1);
        for (const t of db.tasks) if (t.deliverableId === id) t.deliverableId = null;
        for (const n of db.inbox) if (n.documentId === id) n.documentId = null;
        save();
        return ok({ ok: true });
      }
      break;
    }

    case 'automations': {
      if (!id && method === 'GET') return ok(db.automations);
      if (!id && method === 'POST') {
        if (!body.name || !body.prompt) return bad('name and prompt are required');
        const schedule = body.schedule?.type === 'daily'
          ? { type: 'daily', time: String(body.schedule.time || '09:00') }
          : { type: 'interval', minutes: Math.max(1, Number(body.schedule?.minutes) || 1440) };
        const a = {
          id: uid(), name: String(body.name), prompt: String(body.prompt),
          helperId: HELPER_MAP[body.helperId] ? body.helperId : 'vizzy',
          schedule, enabled: body.enabled !== false,
          lastRun: null, nextRun: computeNextRun(schedule), runs: 0, createdAt: Date.now(),
        };
        db.automations.unshift(a); save();
        return ok(a, 201);
      }
      const a = db.automations.find((x) => x.id === id);
      if (!a) return notFound();
      if (p[2] === 'run' && method === 'POST') {
        const doc = runAutomationNow(a);
        return ok({ automation: a, document: doc });
      }
      if (method === 'PATCH') {
        if (body.name !== undefined) a.name = String(body.name);
        if (body.prompt !== undefined) a.prompt = String(body.prompt);
        if (body.helperId !== undefined && HELPER_MAP[body.helperId]) a.helperId = body.helperId;
        if (body.enabled !== undefined) a.enabled = !!body.enabled;
        if (body.schedule) {
          a.schedule = body.schedule.type === 'daily'
            ? { type: 'daily', time: String(body.schedule.time || '09:00') }
            : { type: 'interval', minutes: Math.max(1, Number(body.schedule.minutes) || 1440) };
          a.nextRun = computeNextRun(a.schedule);
        }
        save();
        return ok(a);
      }
      if (method === 'DELETE') {
        db.automations.splice(db.automations.indexOf(a), 1); save();
        return ok({ ok: true });
      }
      break;
    }

    case 'inbox': {
      if (p[1] === 'read' && method === 'POST') {
        for (const i of db.inbox) i.read = true;
        save();
        return ok({ ok: true });
      }
      return ok(db.inbox);
    }

    case 'sites': {
      if (!id && method === 'GET') return ok(db.sites);
      if (!id && method === 'POST') {
        if (!body.name) return bad('name is required');
        let slug = slugify(body.slug || body.name);
        while (db.sites.some((s) => s.slug === slug)) slug += '-' + uid().slice(0, 4);
        const site = {
          id: uid(), name: String(body.name), slug,
          palette: PALETTES[body.palette] ? body.palette : 'midnight',
          sections: defaultSections(db.brain),
          published: true, createdAt: Date.now(), updatedAt: Date.now(),
        };
        db.sites.unshift(site); save();
        return ok(site, 201);
      }
      const site = db.sites.find((s) => s.id === id);
      if (!site) return notFound();
      if (p[2] === 'generate' && method === 'POST') {
        // demo always uses the offline engine, so regenerate from the Brain
        site.sections = defaultSections(db.brain);
        site.updatedAt = Date.now();
        save();
        return ok(site);
      }
      if (p[2] === 'preview') return { status: 200, html: renderSite(site, db.brain) };
      if (method === 'GET') return ok(site);
      if (method === 'PATCH') {
        if (body.name !== undefined) site.name = String(body.name);
        if (body.palette !== undefined && PALETTES[body.palette]) site.palette = body.palette;
        if (body.published !== undefined) site.published = !!body.published;
        if (Array.isArray(body.sections)) site.sections = body.sections;
        site.updatedAt = Date.now();
        save();
        return ok(site);
      }
      if (method === 'DELETE') {
        db.sites.splice(db.sites.indexOf(site), 1); save();
        return ok({ ok: true });
      }
      break;
    }

    case 'calendar': {
      if (p[1] === 'generate' && method === 'POST') {
        const platforms = Array.isArray(body.platforms) && body.platforms.length
          ? body.platforms.map(String) : ['LinkedIn', 'Instagram', 'X'];
        let start = body.startDate ? new Date(body.startDate) : new Date();
        if (Number.isNaN(start.getTime())) start = new Date();
        const angles = [
          'a customer pain point and how you solve it',
          'a behind-the-scenes look at how you work',
          'a practical tip your audience can use today',
          'a common myth in your industry, debunked',
          'a customer success story or result',
          'a question that starts a conversation',
          'your product or service, presented with a clear offer',
        ];
        const created = [];
        for (let i = 0; i < 7; i++) {
          const platform = platforms[i % platforms.length];
          const { text } = ask('soshie', `Write ONE ${platform} post about ${angles[i]}. Return only the post text, ready to publish.`);
          const date = new Date(start.getTime() + i * 86_400_000).toISOString().slice(0, 10);
          const post = { id: uid(), platform, content: text, date, status: 'draft', helperId: 'soshie', createdAt: Date.now() };
          db.calendar.unshift(post);
          created.push(post);
        }
        save();
        return ok(created);
      }
      if (!id && method === 'GET') return ok(db.calendar);
      if (!id && method === 'POST') {
        if (!body.content) return bad('content is required');
        const post = {
          id: uid(), platform: String(body.platform || 'LinkedIn'), content: String(body.content),
          date: String(body.date || new Date().toISOString().slice(0, 10)),
          status: ['draft', 'scheduled', 'posted'].includes(body.status) ? body.status : 'draft',
          helperId: 'soshie', createdAt: Date.now(),
        };
        db.calendar.unshift(post); save();
        return ok(post, 201);
      }
      const post = db.calendar.find((x) => x.id === id);
      if (!post) return notFound();
      if (method === 'PATCH') {
        if (body.content !== undefined) post.content = String(body.content);
        if (body.platform !== undefined) post.platform = String(body.platform);
        if (body.date !== undefined) post.date = String(body.date);
        if (['draft', 'scheduled', 'posted'].includes(body.status)) post.status = body.status;
        save();
        return ok(post);
      }
      if (method === 'DELETE') {
        db.calendar.splice(db.calendar.indexOf(post), 1); save();
        return ok({ ok: true });
      }
      break;
    }

    case 'emails': {
      if (p[1] === 'generate' && method === 'POST') {
        const goal = body.goal || 'a promotional campaign';
        const { text } = ask('emmie', `Write an email campaign for: ${goal}. Include a subject line, preheader, and full body.`);
        const subjectMatch = text.match(/subject[^:\n]*:\s*(.+)/i);
        const email = {
          id: uid(),
          subject: (subjectMatch ? subjectMatch[1] : `Campaign: ${goal}`).slice(0, 120).replace(/[*_#]/g, '').trim(),
          preheader: '', body: text, audience: 'All subscribers', status: 'draft', createdAt: Date.now(),
        };
        db.emails.unshift(email); save();
        return ok(email, 201);
      }
      if (!id && method === 'GET') return ok(db.emails);
      if (!id && method === 'POST') {
        if (!body.subject) return bad('subject is required');
        const email = {
          id: uid(), subject: String(body.subject), preheader: String(body.preheader || ''),
          body: String(body.body || ''), audience: String(body.audience || 'All subscribers'),
          status: 'draft', createdAt: Date.now(),
        };
        db.emails.unshift(email); save();
        return ok(email, 201);
      }
      if (method === 'DELETE') {
        const i = db.emails.findIndex((e) => e.id === id);
        if (i === -1) return notFound();
        db.emails.splice(i, 1); save();
        return ok({ ok: true });
      }
      break;
    }

    case 'seo': {
      if (p[1] === 'audit' && method === 'POST') {
        let report;
        if (body.siteId) {
          const site = db.sites.find((s) => s.id === body.siteId);
          if (!site) return notFound('site not found');
          report = auditHTML(renderSite(site, db.brain), `Studio site: ${site.name}`);
        } else if (body.url) {
          return { status: 502, data: { error: 'Auditing external URLs needs the full HELIX app (this demo runs sandboxed in your browser). Pick one of your Studio sites instead — that works right here.' } };
        } else return bad('provide url or siteId');
        report.id = uid();
        db.seoAudits.unshift(report);
        if (db.seoAudits.length > 50) db.seoAudits.length = 50;
        save();
        return ok(report);
      }
      if (p[1] === 'audits') return ok(db.seoAudits);
      break;
    }

    case 'analytics':
      return ok(analyticsSummary());

    case 'settings': {
      if (method === 'GET') return ok({ ...db.settings, apiKey: undefined, hasKey: !!db.settings.apiKey });
      if (method === 'PUT') {
        if (body.provider !== undefined && ['offline', 'anthropic', 'openai', 'ollama'].includes(body.provider)) db.settings.provider = body.provider;
        if (body.apiKey !== undefined) db.settings.apiKey = String(body.apiKey);
        if (body.model !== undefined) db.settings.model = String(body.model);
        if (body.baseUrl !== undefined) db.settings.baseUrl = String(body.baseUrl);
        save();
        return ok({ ...db.settings, apiKey: undefined, hasKey: !!db.settings.apiKey });
      }
      break;
    }

    case 'export':
      return ok(db);

    case 'import': {
      if (method === 'POST') {
        if (!body || typeof body !== 'object' || !body.brain || typeof body.brain !== 'object') {
          return bad('not a valid HELIX export');
        }
        const base = DEFAULTS();
        const next = {};
        for (const [k, def] of Object.entries(base)) {
          const v = body[k];
          if (Array.isArray(def)) next[k] = Array.isArray(v) ? v : def;
          else if (def && typeof def === 'object') next[k] = { ...def, ...(v && typeof v === 'object' && !Array.isArray(v) ? v : {}) };
          else next[k] = v ?? def;
        }
        db = next;
        for (const a of db.automations) if (a && a.schedule) a.nextRun = computeNextRun(a.schedule);
        save();
        return ok({ ok: true });
      }
      break;
    }
  }
  return notFound(`no route: ${method} ${pathname}`);
}

return { handle, previewHTML, recordView, exportJSON: () => JSON.stringify(db, null, 2) };

'use strict';

// ---------- utilities ----------
const $ = (sel, el = document) => el.querySelector(sel);
const esc = (s) => String(s ?? '')
  .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
  .replaceAll('"', '&quot;').replaceAll("'", '&#39;');

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'content-type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `${res.status} error`);
  return data;
}

function toast(msg, isErr = false) {
  let stack = $('#toasts');
  if (!stack) {
    stack = document.createElement('div');
    stack.id = 'toasts';
    document.body.appendChild(stack);
  }
  const el = document.createElement('div');
  el.className = 'toast' + (isErr ? ' err' : '');
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}

// Minimal markdown → HTML (input is escaped first).
function md(text) {
  let t = esc(text);
  // code blocks
  t = t.replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`);
  // tables
  t = t.replace(/((?:^\|.*\|\s*$\n?)+)/gm, (block) => {
    const rows = block.trim().split('\n').map((r) => r.trim());
    if (rows.length < 2) return block;
    const cells = (r) => r.replace(/^\||\|$/g, '').split('|').map((c) => c.trim());
    const head = cells(rows[0]);
    const body = rows.slice(rows[1].match(/^\|[\s\-:|]+\|$/) ? 2 : 1);
    return `<table><thead><tr>${head.map((h) => `<th>${h}</th>`).join('')}</tr></thead><tbody>${
      body.map((r) => `<tr>${cells(r).map((c) => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  });
  const lines = t.split('\n');
  const out = [];
  let list = null; // 'ul' | 'ol'
  const closeList = () => { if (list) { out.push(`</${list}>`); list = null; } };
  for (const line of lines) {
    if (/^<(pre|table)/.test(line) || /^<\/(pre|table)/.test(line)) { closeList(); out.push(line); continue; }
    const h = line.match(/^(#{1,3})\s+(.*)/);
    if (h) { closeList(); out.push(`<h${h[1].length}>${h[2]}</h${h[1].length}>`); continue; }
    if (/^\s*[-*]\s+\[[ x]\]\s+/.test(line)) {
      if (list !== 'ul') { closeList(); out.push('<ul>'); list = 'ul'; }
      const done = /\[x\]/i.test(line);
      out.push(`<li>${done ? '☑' : '☐'} ${line.replace(/^\s*[-*]\s+\[[ x]\]\s+/i, '')}</li>`);
      continue;
    }
    if (/^\s*[-*]\s+/.test(line)) {
      if (list !== 'ul') { closeList(); out.push('<ul>'); list = 'ul'; }
      out.push(`<li>${line.replace(/^\s*[-*]\s+/, '')}</li>`);
      continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      if (list !== 'ol') { closeList(); out.push('<ol>'); list = 'ol'; }
      out.push(`<li>${line.replace(/^\s*\d+\.\s+/, '')}</li>`);
      continue;
    }
    closeList();
    if (/^---+\s*$/.test(line)) { out.push('<hr>'); continue; }
    if (/^&gt;\s?/.test(line)) { out.push(`<blockquote>${line.replace(/^&gt;\s?/, '')}</blockquote>`); continue; }
    if (line.trim() === '') { out.push(''); continue; }
    out.push(`<p>${line}</p>`);
  }
  closeList();
  let html = out.join('\n');
  html = html
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return `<div class="md">${html}</div>`;
}

function modal(inner, { wide = false } = {}) {
  const back = document.createElement('div');

  const hash = location.hash.slice(2) || 'dashboard';
  const [page, ...rest] = hash.split('/');
  renderSidebar(page);
  const fn = routes[page] || routes.dashboard;
  // Each navigation renders into its own container. Switching pages detaches
  // the old container, so a slower (stale) route can never overwrite the
  // page the user is actually looking at.
  const root = document.createElement('div');
  root.innerHTML = '<div class="page"><p class="muted">Loading…</p></div>';
  const host = $('#main');
  host.replaceChildren(root);
  closeDrawer();
  fn(root, rest).catch((e) => {

    root.innerHTML = `<div class="page"><div class="empty"><div class="big">⚠️</div>${esc(e.message)}</div></div>`;

routes.chat = async (main, [helperId, chatId]) => {
  await loadBoot();
  const helper = state.helperMap[helperId];
  if (!helper) { location.hash = '#/helpers'; return; }
  const chats = await api('GET', `/api/chats?helper=${helperId}`);
  let chat = null;
  if (chatId) chat = await api('GET', `/api/chats/${chatId}`).catch(() => null);

  main.innerHTML = `<div class="page">
    <div class="page-head">
      <div class="row">
        <a class="btn ghost sm" href="#/helpers">←</a>
        <span class="avatar" style="background:${helper.color}22">${helper.emoji}</span>
        <div><h1 style="font-size:19px">${helper.name}</h1><div class="dim">${helper.role}</div></div>
      </div>
      <button class="btn ghost" id="newChat">+ New conversation</button>
    </div>
    <div class="chat-layout">
      <div class="chat-list" id="chatList">
        ${chats.length ? chats.map((c) => `
          <div class="item ${chat && c.id === chat.id ? 'active' : ''}" data-id="${c.id}">
            <b style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.title)}</b>
            <span class="dim">${c.messageCount} messages · ${timeAgo(c.createdAt)}</span>
          </div>`).join('') : '<div class="dim chat-empty" style="padding:10px">No conversations yet.</div>'}
      </div>
      <div class="chat-panel">
        <div class="chat-msgs" id="msgs">
          ${chat ? '' : `<div class="empty" style="border:none"><div class="big">${helper.emoji}</div>
            <b>${helper.name}</b> is ready.<br><span class="dim">Try: “${helper.skills[0]}”. Start typing below — a conversation is created automatically.</span></div>`}
        </div>
        <div class="chat-input">
          <textarea id="input" placeholder="Ask ${helper.name} anything…" rows="1"></textarea>
          <button class="btn" id="send">Send</button>
        </div>
      </div>
    </div>
  </div>`;

  const msgs = $('#msgs', main);
  const input = $('#input', main);
  const sendBtn = $('#send', main);
  const chatList = $('#chatList', main);
  function renderMsgs() {
    if (!chat) return;
    msgs.innerHTML = chat.messages.map((m) => `
      <div class="msg ${m.role}">
        <div class="meta">${m.role === 'user' ? 'You' : `${helper.emoji} ${helper.name}${m.engine === 'offline' ? ' · offline engine' : ''}`}</div>
        ${m.role === 'user' ? `<div>${esc(m.content)}</div>` : md(m.content)}
      </div>`).join('');
    msgs.scrollTop = msgs.scrollHeight;
  }
  renderMsgs();

  chatList.addEventListener('click', (e) => {
    const item = e.target.closest('.item');

  });

    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    sendBtn.disabled = true;
    try {
      if (!chat) chat = await api('POST', '/api/chats', { helperId });
      chat.messages.push({ role: 'user', content, at: Date.now() });
      renderMsgs();
      msgs.insertAdjacentHTML('beforeend', `<div class="msg assistant" data-typing><div class="typing"><i></i><i></i><i></i></div></div>`);
      msgs.scrollTop = msgs.scrollHeight;
      const { reply } = await api('POST', `/api/chats/${chat.id}/messages`, { content });

      chat.messages.push(reply);
      renderMsgs();
      if (chat.messages.length === 2) {
        history.replaceState(null, '', `#/chat/${helperId}/${chat.id}`);

        $('.chat-empty', chatList)?.remove();

            <b style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(content.slice(0, 60))}</b>
            <span class="dim">2 messages · just now</span>
          </div>`);
      }
    } catch (e) {
      $('[data-typing]', msgs)?.remove();
      toast(e.message, true);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
  sendBtn.onclick = send;
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.focus();
};

  refresh();
  $('#palette', main).onchange = async (e) => { await api('PATCH', `/api/sites/${siteId}`, { palette: e.target.value }); refresh(); };
  $('#toggle', main).onclick = async () => { await api('PATCH', `/api/sites/${siteId}`, { published: !site.published }); navigate(); };
  $('#regen', main).onclick = async (e) => {
    e.target.disabled = true; e.target.textContent = '⏳ Writing…';
    await api('POST', `/api/sites/${siteId}/generate`); navigate();
  };
  $('#saveSections', main).onclick = async () => {
    const sections = structuredClone(site.sections);
    main.querySelectorAll('[data-sec]').forEach((el) => {
      const sec = sections[Number(el.dataset.sec)];
      if (el.dataset.item !== undefined) sec.items[Number(el.dataset.item)][el.dataset.f] = el.value;
      else sec[el.dataset.f] = el.value;
    });
    await api('PATCH', `/api/sites/${siteId}`, { sections });
    site.sections = sections;
    toast('Saved — live site updated');
    refresh();
  };
}

routes.marketing = async (main, [tab = 'calendar']) => {
  await loadBoot();
  const [calendar, emails] = await Promise.all([api('GET', '/api/calendar'), api('GET', '/api/emails')]);
  const platBadge = { LinkedIn: 'acc', Instagram: 'warn', X: '', TikTok: 'on', Facebook: 'acc' };
  main.innerHTML = `<div class="page">
    <div class="page-head"><div><h1>📣 Marketing</h1><p>Social calendar and email campaigns, generated on-brand from your Brain.</p></div></div>
    <div class="tabs">
      <button class="${tab === 'calendar' ? 'active' : ''}" onclick="location.hash='#/marketing/calendar'">🗓 Content calendar</button>
      <button class="${tab === 'emails' ? 'active' : ''}" onclick="location.hash='#/marketing/emails'">✉️ Email campaigns</button>
    </div>
    <div id="tabBody"></div>
  </div>`;
  const body = $('#tabBody', main);

  if (tab === 'calendar') {
    const sorted = [...calendar].sort((a, b) => a.date.localeCompare(b.date));
    body.innerHTML = `
      <div class="row" style="margin-bottom:16px">
        <button class="btn" id="genWeek">🪄 Generate a week of posts</button>
        <button class="btn ghost" id="addPost">+ Add post</button>
      </div>
      ${sorted.length ? `<div class="grid c2">${sorted.map((p) => `
        <div class="card">
          <div class="row spread">
            <span class="row"><span class="badge ${platBadge[p.platform] ?? ''}">${esc(p.platform)}</span><b>${p.date}</b></span>
            <select data-status="${p.id}" style="width:auto;padding:4px 8px;font-size:12px">
              ${['draft', 'scheduled', 'posted'].map((s) => `<option ${p.status === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </div>
          <div style="margin:10px 0;white-space:pre-wrap;font-size:13px">${esc(p.content)}</div>
          <div class="row spread">
            <button class="btn ghost sm" data-copy="${p.id}">📋 Copy</button>
            <button class="btn danger sm" data-del="${p.id}">✕</button>
          </div>
        </div>`).join('')}</div>`
      : '<div class="empty"><div class="big">🗓</div>Empty calendar. Hit “Generate a week of posts” — Soshie will fill it.</div>'}`;

    $('#genWeek').onclick = async (e) => {
      e.target.disabled = true; e.target.textContent = '⏳ Soshie is writing…';
      try { await api('POST', '/api/calendar/generate', {}); toast('7 posts drafted 🗓'); navigate(); }
      catch (err) { toast(err.message, true); navigate(); }
    };
    $('#addPost').onclick = () => {
      const m = modal(`
        <h2>New post</h2>
        <label>Platform</label><select id="pPlat"><option>LinkedIn</option><option>Instagram</option><option>X</option><option>TikTok</option><option>Facebook</option></select>
        <label>Date</label><input id="pDate" type="date" value="${new Date().toISOString().slice(0, 10)}">
        <label>Content</label><textarea id="pContent" rows="4"></textarea>
        <div class="actions"><button class="btn ghost" id="pCancel">Cancel</button><button class="btn" id="pSave">Add</button></div>`);
      $('#pCancel', m).onclick = () => m.remove();
      $('#pSave', m).onclick = async () => {
        try {
          await api('POST', '/api/calendar', { platform: $('#pPlat', m).value, date: $('#pDate', m).value, content: $('#pContent', m).value });
          m.remove(); navigate();
        } catch (err) { toast(err.message, true); }
      };
    };
    body.addEventListener('click', async (e) => {
      if (e.target.dataset.del) { await api('DELETE', `/api/calendar/${e.target.dataset.del}`); navigate(); }
      if (e.target.dataset.copy) {
        const post = calendar.find((p) => p.id === e.target.dataset.copy);
        await navigator.clipboard.writeText(post.content); toast('Post copied');
      }
    });
    body.addEventListener('change', async (e) => {
      if (e.target.dataset.status) await api('PATCH', `/api/calendar/${e.target.dataset.status}`, { status: e.target.value });
    });
  } else {
    body.innerHTML = `
      <div class="row" style="margin-bottom:16px">
        <button class="btn" id="genEmail">🪄 Generate a campaign</button>
      </div>
      ${emails.length ? `<div class="grid c2">${emails.map((e) => `
        <div class="card">
          <div class="row spread"><b>${esc(e.subject)}</b><span class="badge">${e.status}</span></div>
          <div class="dim" style="margin:4px 0 10px">${esc(e.audience)} · ${timeAgo(e.createdAt)}</div>
          <div style="max-height:130px;overflow:hidden;font-size:13px" class="muted">${md(e.body.slice(0, 400))}</div>
          <div class="row spread" style="margin-top:10px">
            <button class="btn ghost sm" data-copy="${e.id}">📋 Copy body</button>
            <button class="btn danger sm" data-del="${e.id}">✕</button>
          </div>
        </div>`).join('')}</div>`
      : '<div class="empty"><div class="big">✉️</div>No campaigns yet — Emmie is ready when you are.</div>'}`;

    $('#genEmail').onclick = () => {
      const m = modal(`
        <h2>Generate campaign</h2>
        <label>Campaign goal</label><input id="eGoal" placeholder="Announce our summer sale">
        <div class="actions"><button class="btn ghost" id="eCancel">Cancel</button><button class="btn" id="eGen">🪄 Generate</button></div>`);
      $('#eCancel', m).onclick = () => m.remove();
      $('#eGen', m).onclick = async () => {
        const btn = $('#eGen', m);
        btn.disabled = true; btn.textContent = '⏳ Emmie is writing…';
        try { await api('POST', '/api/emails/generate', { goal: $('#eGoal', m).value }); m.remove(); toast('Campaign drafted ✉️'); navigate(); }
        catch (err) { btn.disabled = false; toast(err.message, true); }
      };
    };
    body.addEventListener('click', async (e) => {
      if (e.target.dataset.del) { await api('DELETE', `/api/emails/${e.target.dataset.del}`); navigate(); }
      if (e.target.dataset.copy) {
        const em = emails.find((x) => x.id === e.target.dataset.copy);
        await navigator.clipboard.writeText(em.body); toast('Copied');
      }
    });
  }
};

routes.seo = async (main) => {
  await loadBoot();
  const [audits, sites] = await Promise.all([api('GET', '/api/seo/audits'), api('GET', '/api/sites')]);
  main.innerHTML = `<div class="page">
    <div class="page-head"><div><h1>🔍 SEO</h1><p>Real on-page audits with 13 weighted checks — score your Studio sites or any live URL.</p></div></div>
    <div class="card" style="margin-bottom:18px">
      <div class="row">
        <input id="seoUrl" placeholder="https://example.com — or pick a Studio site →" style="flex:1;min-width:220px">
        <select id="seoSite" style="width:auto"><option value="">Studio site…</option>
          ${sites.map((s) => `<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select>
        <button class="btn" id="runAudit">🔍 Audit</button>
      </div>
    </div>
    <div id="auditResult"></div>
    ${audits.length ? `<h2 style="font-size:15px;margin:24px 0 10px">Past audits</h2>
      <div class="card pad0">${audits.map((a) => `
        <div class="list-row" data-audit="${a.id}">
          <span class="score-ring" style="font-size:18px;color:${a.score >= 75 ? 'var(--green)' : a.score >= 50 ? 'var(--yellow)' : 'var(--red)'}">${a.grade}</span>
          <span style="flex:1"><b>${esc(a.target)}</b><div class="dim">${a.passed} passed · ${a.failed} to fix</div></span>
          <span class="badge">${a.score}/100</span><span class="dim">${timeAgo(a.createdAt)}</span>
        </div>`).join('')}</div>` : ''}
  </div>`;

  function showReport(r) {
    $('#auditResult').innerHTML = `<div class="card">
      <div class="row spread">
        <div><b style="font-size:16px">${esc(r.target)}</b><div class="dim">${r.passed} checks passed · ${r.failed} need attention</div></div>
        <div class="score-ring" style="color:${r.score >= 75 ? 'var(--green)' : r.score >= 50 ? 'var(--yellow)' : 'var(--red)'}">${r.score}<span class="dim" style="font-size:14px">/100 · ${r.grade}</span></div>
      </div>
      <div style="margin-top:14px">
        ${r.checks.map((c) => `<div class="check">
          <span class="ic">${c.pass ? '✅' : '❌'}</span>
          <span style="flex:1"><b>${esc(c.label)}</b>${c.detail ? ` <span class="dim">— ${esc(c.detail)}</span>` : ''}
            ${c.advice ? `<div class="dim">💡 ${esc(c.advice)}</div>` : ''}</span>
          <span class="badge">w${c.weight}</span>
        </div>`).join('')}
      </div>
    </div>`;
    $('#auditResult').scrollIntoView({ behavior: 'smooth' });
  }

  $('#runAudit').onclick = async (e) => {
    const url = $('#seoUrl').value.trim();
    const siteId = $('#seoSite').value;
    if (!url && !siteId) return toast('Enter a URL or pick a Studio site', true);
    e.target.disabled = true; e.target.textContent = '⏳ Auditing…';
    try { showReport(await api('POST', '/api/seo/audit', siteId ? { siteId } : { url })); }
    catch (err) { toast(err.message, true); }
    e.target.disabled = false; e.target.textContent = '🔍 Audit';
  };
  $(".page", main).addEventListener('click', (e) => {
    const row = e.target.closest('[data-audit]');
    if (row) { const a = audits.find((x) => x.id === row.dataset.audit); if (a) showReport(a); }
  });
};

  main.innerHTML = `<div class="page">
    <div class="page-head"><div><h1>📊 Analytics</h1><p>Real pageviews for every website you publish from the Studio. No cookies, no third parties — tracked locally.</p></div></div>
    <div class="grid c4" style="margin-bottom:18px">
      <div class="card stat"><div class="num">${a.total}</div><div class="lbl">Total pageviews</div></div>
      <div class="card stat"><div class="num">${Object.keys(a.bySite).length}</div><div class="lbl">Sites with traffic</div></div>
      <div class="card stat"><div class="num">${a.series.slice(-7).reduce((x, d) => x + d.count, 0)}</div><div class="lbl">Last 7 days</div></div>
      <div class="card stat"><div class="num">${a.series.at(-1)?.count ?? 0}</div><div class="lbl">Today</div></div>
    </div>
    <div class="card">
      <b>Views — last 14 days</b>
      <div class="bars">${a.series.map((d) => `<div class="bar" style="height:${Math.round((d.count / max) * 100)}%"><span>${d.count || ''}</span></div>`).join('')}</div>
      <div class="bars-x">${a.series.map((d) => `<div>${d.day.slice(5)}</div>`).join('')}</div>
    </div>
    ${Object.keys(a.bySite).length ? `<div class="card" style="margin-top:14px"><b>By site</b>
      ${Object.entries(a.bySite).map(([slug, s]) => `
        <div class="row spread" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          <a href="/sites/${slug}" target="_blank">/sites/${slug}</a><b>${s.total} views</b>
        </div>`).join('')}</div>` : ''}
  </div>`;
};

routes.settings = async (main) => {
  const s = await api('GET', '/api/settings');
  main.innerHTML = `<div class="page">
    <div class="page-head"><div><h1>⚙️ Settings</h1><p>HELIX works fully offline out of the box. Connect a model provider for bespoke AI output.</p></div></div>
    <div class="grid" style="grid-template-columns:1fr 1fr;align-items:start">
      <form class="card" id="settingsForm">
        <b>AI provider</b>
        <label>Provider</label>
        <select name="provider" id="provSel">
          ${[['offline', '⬢ Built-in offline engine (no key needed)'], ['anthropic', 'Anthropic (Claude)'], ['openai', 'OpenAI / compatible'], ['ollama', 'Ollama (local models)']]
            .map(([v, l]) => `<option value="${v}" ${s.provider === v ? 'selected' : ''}>${l}</option>`).join('')}
        </select>
        <label>API key ${s.hasKey ? '<span class="badge on">saved</span>' : ''}</label>
        <input name="apiKey" type="password" placeholder="${s.hasKey ? '•••••••• (leave blank to keep)' : 'Not needed for offline or Ollama'}">
        <label>Model (optional)</label>
        <input name="model" value="${esc(s.model)}" placeholder="claude-sonnet-5 / gpt-4o-mini / llama3.2">
        <label>Base URL (optional)</label>
        <input name="baseUrl" value="${esc(s.baseUrl)}" placeholder="e.g. http://localhost:11434 for Ollama">
        <div style="margin-top:16px"><button class="btn">Save settings</button></div>
        <p class="dim" style="margin-top:12px">Your key is stored only in the local <code>data/db.json</code> on this machine and is never echoed back to the browser.</p>
      </form>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card">
          <b>Your data</b>
          <p class="dim" style="margin:6px 0 12px">Everything lives locally. Export a full backup or restore one.</p>
          <div class="row">
            <a class="btn ghost" href="/api/export" download>⬇ Export everything</a>
            <button class="btn ghost" id="importBtn">⬆ Import backup</button>
            <input type="file" id="importFile" accept="application/json" style="display:none">
          </div>
        </div>
        <div class="card">
          <b>About HELIX</b>
          <p class="dim" style="margin-top:6px">A local-first AI business suite: 12 AI teammates, Brain knowledge base, power-ups, automations, website studio, SEO auditing, marketing tools, and analytics — with zero dependencies and zero data leaving your machine.</p>
        </div>
      </div>
    </div>
  </div>`;

  $('#settingsForm').onsubmit = async (e) => {
    e.preventDefault();
    const body = Object.fromEntries(new FormData(e.target));
    if (!body.apiKey) delete body.apiKey; // keep existing
    await api('PUT', '/api/settings', body);
    toast('Settings saved');
    navigate();
  };
  $('#importBtn').onclick = () => $('#importFile').click();
  $('#importFile').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      await api('POST', '/api/import', data);
      toast('Backup imported ✅');
      location.hash = '#/dashboard';
    } catch (err) { toast('Import failed: ' + err.message, true); }
  };
};

});
